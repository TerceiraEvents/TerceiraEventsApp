name: validate data sync with website

# Runs on push to main and on a weekly schedule. Hits the live URLs
# the app fetches from (special_events.yml, weekly.yml, posts list,
# event_tags.yml) and asserts:
#
#   - each URL returns HTTP 200 and a non-empty, well-shaped body
#   - the app's local TAGS vocabulary is a subset of the website's
#     event_tags.yml (drift in either direction means the app shows
#     no pill for events that use a tag the app doesn't know about)
#
# Pre-merge `lint.yml` runs offline unit tests; this workflow exists
# specifically for "the app's hard-coded URL or schema assumption is
# now stale because the website moved on" — a class of bug that
# silently shows users empty screens. The weekly schedule catches
# drift even when neither repo is being actively merged.

on:
  push:
    branches: [main]
  schedule:
    # Mondays at 09:00 UTC — once a week, low-noise.
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  data-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node scripts/check_data_sync.js
