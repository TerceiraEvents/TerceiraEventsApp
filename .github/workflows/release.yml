name: Production Release

# Triggers when a GitHub release is published. The release tag (e.g. `v1.3.0`)
# must match `expo.version` in `app.json`. Builds an Android production AAB
# on EAS and queues an auto-submit to the Google Play production track.
#
# `versionCode` is auto-incremented by EAS via `cli.appVersionSource = "remote"`
# in `eas.json` — do NOT bump it manually in `app.json`.

on:
  release:
    types: [published]

jobs:
  release:
    name: Build and submit Android to Google Play
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci
      - run: npm install --global eas-cli

      - name: Verify release tag matches app.json version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          APP_VERSION=$(node -p "require('./app.json').expo.version")
          if [ "v${APP_VERSION}" != "$TAG" ]; then
            echo "::error::Release tag '$TAG' does not match expo.version 'v${APP_VERSION}' in app.json. Bump expo.version (and merge to main) before publishing the release."
            exit 1
          fi
          echo "Tag $TAG matches app.json expo.version $APP_VERSION ✓"

      - name: Build Android (production) and auto-submit to Play Store
        run: eas build --platform android --profile production --auto-submit --non-interactive --no-wait
