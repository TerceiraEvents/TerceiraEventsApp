name: Production Release

on:
  push:
    tags: ["v*"]

jobs:
  build_android:
    name: Build Android for Play Store
    type: build
    params:
      platform: android
      profile: production

  build_ios:
    name: Build iOS for App Store
    type: build
    params:
      platform: ios
      profile: production

  submit_android:
    name: Submit to Google Play
    type: submit
    needs: [build_android]
    params:
      build_id: ${{ needs.build_android.outputs.build_id }}
      profile: production

  submit_ios:
    name: Submit to App Store
    type: submit
    needs: [build_ios]
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
      profile: production
